<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据填充工具 — 英语学习网站</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:1rem; }
.card { background:#fff; border-radius:12px; padding:2rem; max-width:500px; width:100%; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
h1 { font-size:1.3rem; margin-bottom:0.3rem; }
.sub { color:#888; font-size:0.85rem; margin-bottom:1.5rem; }
label { display:block; font-weight:600; margin-bottom:0.3rem; font-size:0.9rem; }
input, select { width:100%; padding:0.6rem 0.8rem; border:1px solid #d9d9d9; border-radius:8px; font-size:0.95rem; margin-bottom:1rem; }
input:focus, select:focus { outline:none; border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,0.15); }
.btn { display:block; width:100%; padding:0.75rem; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; margin-bottom:0.6rem; }
.btn-primary { background:#6366f1; color:#fff; }
.btn-primary:hover { background:#4f46e5; }
.btn-outline { background:#fff; color:#6366f1; border:1.5px solid #6366f1; }
.btn-outline:hover { background:#f5f3ff; }
.result { margin-top:1rem; padding:0.75rem; border-radius:8px; font-size:0.9rem; display:none; }
.result.success { display:block; background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
.result.error { display:block; background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
.info { background:#f0f4ff; border-radius:8px; padding:0.75rem; margin:1rem 0; font-size:0.85rem; color:#4338ca; }
.info span { font-weight:600; }
</style>
</head>
<body>
<div class="card">
    <h1>数据填充工具</h1>
    <p class="sub">为英语学习网站填充模拟数据，方便论文截图</p>

    <label for="username">请输入你的账号名</label>
    <input type="text" id="username" placeholder="例如：zhangsan">

    <label for="module">选择要填充的模块</label>
    <select id="module">
        <option value="speaking">口语练习 — 全部完成（30句跟读 + 对话填空）</option>
        <option value="all">全部模块 — 口语+听力+词汇+语法+句式+写作</option>
    </select>

    <button class="btn btn-primary" onclick="fillData()">一键填充</button>
    <button class="btn btn-outline" onclick="clearData()">清空该账号数据</button>

    <div id="result"></div>

    <div class="info" id="currentData" style="display:none;"></div>
</div>

<script>
const RESULT = document.getElementById('result');
const CURRENT = document.getElementById('currentData');
const USERNAME = document.getElementById('username');
const MODULE = document.getElementById('module');

// 页面加载时读取并显示当前数据
window.addEventListener('DOMContentLoaded', () => {
    const users = JSON.parse(localStorage.getItem('travelEdu_users') || '{}');
    const names = Object.keys(users);
    if (names.length > 0) {
        USERNAME.value = names[0];
        CURRENT.style.display = 'block';
        CURRENT.innerHTML = '发现以下账号：<br>' + names.map(n => {
            const p = users[n].progress || {};
            const speakCount = (p.speaking || []).filter(x => typeof x === 'number').length;
            const hasDialogue = (p.speaking || []).includes('dialogue');
            const resourceCount = (p.resources || []).length;
            const vocabCount = (p.vocabulary || []).length;
            const sentCount = (p.sentences || []).length;
            return '<span>' + n + '</span>：口语' + speakCount + '/30' + (hasDialogue?' ✅对话':'') + ' 景点' + resourceCount + ' 词汇' + vocabCount + ' 句式' + sentCount;
        }).join('<br>');
    }
});

function showResult(msg, type) {
    RESULT.style.display = 'block';
    RESULT.className = 'result ' + type;
    RESULT.textContent = msg;
}

function fillData() {
    const name = USERNAME.value.trim();
    if (!name) { showResult('请输入账号名', 'error'); return; }

    const users = JSON.parse(localStorage.getItem('travelEdu_users') || '{}');
    if (!users[name]) {
        users[name] = { progress: { resources:[], speaking:[], listening:null, vocabulary:[], grammar:null, sentences:[], writing:null } };
    }
    const prog = users[name].progress;

    const module = MODULE.value;

    if (module === 'speaking' || module === 'all') {
        // 口语：30句跟读全部完成
        const allSentences = [];
        for (let i = 0; i < 30; i++) allSentences.push(i);
        allSentences.push('dialogue'); // 对话填空也完成
        prog.speaking = allSentences;
    }

    if (module === 'all') {
        // 听力：满分
        prog.listening = { score: 10, total: 10 };

        // 词汇：全部学完（假设20个词汇）
        const allVocab = [];
        for (let i = 0; i < 20; i++) allVocab.push(i);
        prog.vocabulary = allVocab;

        // 语法：满分
        prog.grammar = { score: 20, total: 20 };

        // 句式：30题全部完成
        const allSentences = [];
        for (let i = 0; i < 30; i++) allSentences.push(i);
        prog.sentences = allSentences;

        // 写作：完成
        prog.writing = { score: 14, title: 'My Dream Travel Destination', content: 'I have always dreamed of visiting Japan...' };

        // 自主学习：景点学完
        const allResources = [];
        for (let i = 0; i < 20; i++) allResources.push(i);
        prog.resources = allResources;
    }

    localStorage.setItem('travelEdu_users', JSON.stringify(users));
    showResult('数据填充成功！现在登录网站即可看到全部进度 🎉', 'success');

    // 刷新显示
    CURRENT.style.display = 'block';
    const p = prog;
    const speakCount = (p.speaking || []).filter(x => typeof x === 'number').length;
    CURRENT.innerHTML = '<span>' + name + '</span> 当前进度：<br>口语' + speakCount + '/30 ' + ((p.speaking||[]).includes('dialogue')?'✅对话':'') + ' | 景点' + (p.resources||[]).length + ' | 词汇' + (p.vocabulary||[]).length + ' | 句式' + (p.sentences||[]).length + ' | 听力' + (p.listening?p.listening.score+'/'+p.listening.total:'-') + ' | 语法' + (p.grammar?p.grammar.score+'/'+p.grammar.total:'-') + ' | 写作' + (p.writing?'✅':'-');
}

function clearData() {
    const name = USERNAME.value.trim();
    if (!name) { showResult('请输入账号名', 'error'); return; }
    if (!confirm('确定要清空 ' + name + ' 的所有学习数据吗？')) return;

    const users = JSON.parse(localStorage.getItem('travelEdu_users') || '{}');
    if (users[name]) {
        users[name].progress = { resources:[], speaking:[], listening:null, vocabulary:[], grammar:null, sentences:[], writing:null };
        localStorage.setItem('travelEdu_users', JSON.stringify(users));
        showResult(name + ' 的数据已清空', 'success');
        CURRENT.style.display = 'none';
    }
}
</script>
</body>
</html>
